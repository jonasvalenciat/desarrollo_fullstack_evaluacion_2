spring:
  application:
    name: inventory-service
  profiles:
    active: h2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
server:
  port: 8086

logging:
  level:
    root: INFO
    cl.duoc.fullstack.inventory_service_m6: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%-5level] %logger{0} - %msg%n"
  file:
    name: logs/inventory-service.log
